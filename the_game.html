<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>🎮 The Game - Memory</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    /* === إعادة تعيين و base === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #0b0b1a;
    }

    /* صفحة اللعبة - خلفية مشتركة مع الصفحة الأولى */
    .page-game {
      position: fixed;
      top: 0;
      right: 0;
      width: 100%;
      height: 100vh;
      background: url('https://encrypted-tbn3.gstatic.com/shopping?q=tbn:ANd9GcTmRCU8kl8pZcX70wDVjcJ8fx3Jlv1HPWn88tAjbMIbHI1QE742qyOQY6-QEPgZRydEKeDmzdbPUXdV8BMIVYXdp4ayuUGvog0jTYlUT6XMJYoJ5RKv4x2EkeY&usqp=CAc') center center / cover no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 1rem 1rem 1.2rem;
      z-index: 5;
      overflow-y: auto;
      overflow-x: hidden;
      direction: rtl;
    }

    /* طبقة التعتيم الخفيفة (نفس الطراز) */
    .page-game::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.40);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      z-index: 0;
    }

    /* كل المحتوى فوق التعتيم */
    .game-content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-bottom: 1rem;
    }

    /* رأس الصفحة - Glassmorphism */
    .game-header {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 40px 20px 40px 20px;
      padding: 1rem 1.8rem;
      margin-bottom: 1.5rem;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 35px rgba(0,0,0,0.3);
      width: 100%;
    }

    .game-header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 4px 20px rgba(0,0,0,0.4);
      letter-spacing: 1px;
    }

    .game-header p {
      font-size: 1.1rem;
      color: #f0e9d0;
      opacity: 0.9;
      margin-top: 0.2rem;
      font-weight: 500;
    }

    /* شبكة البطاقات */
    .memory-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 480px;
      margin: 0.5rem auto 1rem;
      perspective: 1200px;
    }

    .card {
      aspect-ratio: 1 / 1;
      background: transparent;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card.matched {
      transform: rotateY(180deg);
      cursor: default;
      filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.3));
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .card-back {
      background: linear-gradient(145deg, rgba(255, 215, 0, 0.2), rgba(255, 180, 0, 0.05));
      transform: rotateY(0deg);
      font-size: 2.8rem;
      color: #fff3d1;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
      border: 2px solid rgba(255, 215, 0, 0.15);
    }

    .card-front {
      transform: rotateY(180deg);
      background: rgba(20, 20, 35, 0.7);
      backdrop-filter: blur(4px);
      padding: 6px;
    }

    .card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
      display: block;
      background: #1a1a2e;
    }

    /* زر إعادة (في حالة الرغبة) لكن غير مطلوب، نضعه صغيراً */
    .reset-area {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 0.5rem 0 0.2rem;
      width: 100%;
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.5rem 1.8rem;
      border-radius: 60px;
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.25s;
      letter-spacing: 0.5px;
    }

    .btn-ghost:hover {
      background: rgba(255, 215, 0, 0.15);
      border-color: #ffd966;
      transform: scale(1.02);
    }

    /* Popup (مطابقة زوج) */
    .popup-overlay {
      position: fixed;
      top: 0;
      right: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1.5rem;
    }

    .popup-overlay.active {
      display: flex;
    }

    .popup-card {
      background: rgba(30, 30, 50, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 48px 24px 48px 24px;
      padding: 2rem 1.8rem 1.8rem;
      max-width: 380px;
      width: 92%;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 40px 70px rgba(0, 0, 0, 0.6);
      animation: popFade 0.3s ease-out forwards;
      color: #fff;
    }

    @keyframes popFade {
      0% { opacity: 0; transform: scale(0.85) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .popup-card img {
      width: 100%;
      max-height: 180px;
      object-fit: contain;
      border-radius: 24px;
      background: rgba(0,0,0,0.2);
      margin-bottom: 0.8rem;
      border: 1px solid rgba(255,215,0,0.1);
    }

    .popup-card .popup-text {
      font-size: 1.3rem;
      font-weight: 700;
      background: rgba(255,215,0,0.1);
      padding: 0.5rem 1rem;
      border-radius: 60px;
      display: inline-block;
      color: #ffecb0;
    }

    /* نافذة الفوز (Confetti) */
    .win-overlay {
      position: fixed;
      top: 0;
      right: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1.5rem;
    }

    .win-overlay.active {
      display: flex;
    }

    .win-card {
      background: rgba(20, 20, 40, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 60px 30px 60px 30px;
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 92%;
      text-align: center;
      border: 2px solid rgba(255, 215, 0, 0.25);
      box-shadow: 0 0 80px rgba(255, 215, 0, 0.2);
      animation: popFade 0.5s ease-out forwards;
      color: #fff;
      position: relative;
    }

    .win-card h2 {
      font-size: 3rem;
      margin-bottom: 0.2rem;
      background: linear-gradient(135deg, #f9d423, #ff4e50);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .win-card .win-sub {
      font-size: 1.3rem;
      margin: 0.8rem 0 1.2rem;
      opacity: 0.95;
      line-height: 1.6;
    }

    .btn-win {
      background: linear-gradient(145deg, rgba(255, 215, 0, 0.2), rgba(255, 200, 0, 0.05));
      border: 2px solid #ffd966;
      padding: 1rem 2.5rem;
      border-radius: 80px;
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      cursor: pointer;
      transition: 0.25s;
      backdrop-filter: blur(8px);
      margin-top: 0.5rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    .btn-win:hover {
      transform: scale(1.03);
      background: rgba(255, 215, 0, 0.25);
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
    }

    /* Confetti canvas */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 250;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .game-header h1 { font-size: 1.8rem; }
      .game-header p { font-size: 0.95rem; }
      .memory-grid { gap: 8px; }
      .card-back { font-size: 2rem; }
      .popup-card { padding: 1.5rem 1rem; }
      .win-card h2 { font-size: 2.4rem; }
      .btn-win { font-size: 1.2rem; padding: 0.8rem 1.8rem; }
    }

    @media (min-width: 600px) {
      .memory-grid { gap: 16px; max-width: 520px; }
      .game-header { padding: 1.2rem 2.5rem; }
    }

    /* إخفاء السكرول */
    .page-game::-webkit-scrollbar { width: 0; background: transparent; }
    .page-game { scrollbar-width: none; }
  </style>
</head>
<body>

  <!-- صفحة اللعبة -->
  <div id="pageGame" class="page-game">
    <div class="game-content">
      <!-- الرأس -->
      <div class="game-header">
        <h1>The Game 🎮</h1>
        <p>يلا بينا</p>
      </div>

      <!-- شبكة البطاقات -->
      <div id="memoryGrid" class="memory-grid"></div>

      <!-- زر إعادة (للمساعدة) -->
      <div class="reset-area">
        <button id="resetGameBtn" class="btn-ghost">🔄 إعادة اللعبة</button>
      </div>
    </div>
  </div>

  <!-- Popup المطابقة -->
  <div id="matchPopup" class="popup-overlay">
    <div class="popup-card" id="popupCard">
      <img id="popupImg" src="" alt="ميم" />
      <div class="popup-text" id="popupText">🎯 برافو</div>
    </div>
  </div>

  <!-- نافذة الفوز -->
  <div id="winOverlay" class="win-overlay">
    <div class="win-card">
      <h2>يا عم 😂</h2>
      <div class="win-sub">ايه يا واد الشطاره دي .....اشطر كتكوت ده و لا ايه🎉</div>
      <button id="goToGiftBtn" class="btn-win">🎁 يلا عشان افاجئك</button>
    </div>
  </div>

  <!-- Confetti Canvas -->
  <canvas id="confetti-canvas"></canvas>

  <script>
    (function() {
      'use strict';

      // === بيانات البطاقات (سهلة التعديل) ===
      const CARD_DATA = [
        {
          id: 1,
          img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTMdaXkFCMjXKsOLOAQh9ilWRBiqkTFbq60yA&s',
          memeImg: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTMdaXkFCMjXKsOLOAQh9ilWRBiqkTFbq60yA&s',
          memeText: '😆 سو فاني'
        },
        {
          id: 2,
          img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTdJCoTL8l9gv9IgWJwk42CUI0qQja32PhiTw&s',
          memeImg: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTdJCoTL8l9gv9IgWJwk42CUI0qQja32PhiTw&s',
          memeText: '😂 انت اهو'
        },
        {
          id: 3,
          img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRR4OMiyyT0Wm_Rp9ieaTQDcIFNwCTrnsTkIA&s',
          memeImg: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRR4OMiyyT0Wm_Rp9ieaTQDcIFNwCTrnsTkIA&s',
          memeText: '🤣 النسونجي اهو'
        },
        {
          id: 4,
          img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQnqAsbk1FmO7Jyc6BYbuXAZrvCj7iqXfKljA&s',
          memeImg: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQnqAsbk1FmO7Jyc6BYbuXAZrvCj7iqXfKljA&s',
          memeText: '😜 يا واد يا تقيل'
        }
      ];

      // === عناصر DOM ===
      const grid = document.getElementById('memoryGrid');
      const matchPopup = document.getElementById('matchPopup');
      const popupImg = document.getElementById('popupImg');
      const popupText = document.getElementById('popupText');
      const winOverlay = document.getElementById('winOverlay');
      const goToGiftBtn = document.getElementById('goToGiftBtn');
      const resetBtn = document.getElementById('resetGameBtn');
      const confettiCanvas = document.getElementById('confetti-canvas');

      // حالة اللعبة
      let cards = [];
      let flippedCards = [];
      let matchedPairs = 0;
      let lockBoard = false;
      let timeoutId = null;
      let currentMemeData = null; // للبوب أب

      // === بناء المجموعة (8 بطاقات) ===
      function buildCardDeck() {
        const deck = [];
        CARD_DATA.forEach((item, index) => {
          deck.push({ ...item, pairId: index, matched: false, flipped: false, element: null });
          deck.push({ ...item, pairId: index, matched: false, flipped: false, element: null });
        });
        return shuffleArray(deck);
      }

      // خلط عشوائي
      function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      // === عرض الشبكة ===
      function renderGame() {
        grid.innerHTML = '';
        cards = buildCardDeck();
        matchedPairs = 0;
        flippedCards = [];
        lockBoard = false;
        if (timeoutId) clearTimeout(timeoutId);
        winOverlay.classList.remove('active');
        matchPopup.classList.remove('active');
        stopConfetti();

        cards.forEach((card, index) => {
          const cardDiv = document.createElement('div');
          cardDiv.className = 'card';
          cardDiv.dataset.index = index;

          // الوجه الخلفي
          const back = document.createElement('div');
          back.className = 'card-face card-back';
          back.textContent = '🎂';

          // الوجه الأمامي
          const front = document.createElement('div');
          front.className = 'card-face card-front';
          const img = document.createElement('img');
          img.src = card.img;
          img.alt = 'بطاقة';
          img.loading = 'lazy';
          front.appendChild(img);

          cardDiv.appendChild(back);
          cardDiv.appendChild(front);
          grid.appendChild(cardDiv);
          card.element = cardDiv;
          card.flipped = false;
          card.matched = false;
        });
      }

      // === قلب البطاقة ===
      function flipCard(card, index) {
        if (lockBoard) return;
        if (card.matched) return;
        if (card.flipped) return;
        if (flippedCards.length >= 2) return;

        card.flipped = true;
        card.element.classList.add('flipped');
        flippedCards.push(card);

        if (flippedCards.length === 2) {
          checkMatch();
        }
      }

      // === التحقق من التطابق ===
      function checkMatch() {
        lockBoard = true;
        const [card1, card2] = flippedCards;

        if (card1.pairId === card2.pairId) {
          // متطابقان
          card1.matched = true;
          card2.matched = true;
          matchedPairs++;
          flippedCards = [];
          lockBoard = false;

          // عرض البوب أب مع الميم
          showMatchPopup(card1);

          // التحقق من الفوز
          if (matchedPairs === CARD_DATA.length) {
            setTimeout(() => {
              showWinScreen();
            }, 500);
          }
        } else {
          // غير متطابقين: نغلقهما بعد ثانية
          timeoutId = setTimeout(() => {
            card1.flipped = false;
            card2.flipped = false;
            card1.element.classList.remove('flipped');
            card2.element.classList.remove('flipped');
            flippedCards = [];
            lockBoard = false;
            timeoutId = null;
          }, 1000);
        }
      }

      // === عرض البوب أب للمطابقة ===
      function showMatchPopup(card) {
        popupImg.src = card.memeImg || card.img;
        popupImg.alt = 'ميم';
        popupText.textContent = card.memeText || '🎯 أحسنت!';
        matchPopup.classList.add('active');
        // إغلاق عند الضغط في أي مكان
        matchPopup.onclick = function(e) {
          if (e.target === matchPopup || e.target.closest('.popup-card')) {
            matchPopup.classList.remove('active');
          }
        };
        // إغلاق تلقائي بعد 2.5 ثانية
        setTimeout(() => {
          matchPopup.classList.remove('active');
        }, 2500);
      }

      // === شاشة الفوز + كونفيتي ===
      function showWinScreen() {
        winOverlay.classList.add('active');
        startConfetti();
      }

      // === كونفيتي ===
      let confettiInterval = null;
      function startConfetti() {
        const canvas = confettiCanvas;
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#ffe66d', '#ff85a1', '#a29bfe'];

        for (let i = 0; i < 180; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            size: Math.random() * 8 + 4,
            speed: Math.random() * 4 + 2,
            color: colors[Math.floor(Math.random() * colors.length)],
            angle: Math.random() * 360,
            wobble: Math.random() * 0.1 + 0.02,
          });
        }

        function draw() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          let alive = false;
          particles.forEach(p => {
            p.y += p.speed * 0.6;
            p.x += Math.sin(p.angle) * 0.8;
            p.angle += p.wobble;
            if (p.y < canvas.height + 30) alive = true;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
            // إعادة تدوير
            if (p.y > canvas.height + 40) {
              p.y = -20;
              p.x = Math.random() * canvas.width;
            }
          });
          if (alive || particles.some(p => p.y < canvas.height + 20)) {
            confettiInterval = requestAnimationFrame(draw);
          }
        }
        draw();
      }

      function stopConfetti() {
        if (confettiInterval) {
          cancelAnimationFrame(confettiInterval);
          confettiInterval = null;
        }
        const canvas = confettiCanvas;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      // === إعادة اللعبة ===
      function resetGame() {
        stopConfetti();
        winOverlay.classList.remove('active');
        matchPopup.classList.remove('active');
        if (timeoutId) clearTimeout(timeoutId);
        renderGame();
      }

      // === ربط الأحداث ===
      function attachEvents() {
        grid.addEventListener('click', function(e) {
          const cardElement = e.target.closest('.card');
          if (!cardElement) return;
          const index = parseInt(cardElement.dataset.index);
          const card = cards[index];
          if (!card) return;
          flipCard(card, index);
        });

        resetBtn.addEventListener('click', resetGame);

        // زر الذهاب لصفحة الجائزة
        goToGiftBtn.addEventListener('click', function() {
          // إيقاف الكونفيتي قبل الانتقال
          stopConfetti();
          // الانتقال إلى صفحة prize.html
          window.location.href = 'prize.html';
        });

        // إغلاق البوب أب إذا نقر في الخارج (تم بالفعل)
      }

      // === تهيئة ===
      function init() {
        renderGame();
        attachEvents();
        // ضبط canvas عند تغيير الحجم
        window.addEventListener('resize', function() {
          const canvas = confettiCanvas;
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        });
      }

      init();

    })();
  </script>

</body>
</html>
