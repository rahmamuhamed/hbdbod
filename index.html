<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Happy Birthday Abdo 🎉</title>
  <!-- Google Fonts: خطوط عربية جميلة -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    /* إعادة تعيين أساسية */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: #1a1a2e;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* الصفحة الأولى - Home */
    .page-home {
      position: fixed;
      top: 0;
      right: 0;
      width: 100%;
      height: 100vh;
      background: url('https://encrypted-tbn3.gstatic.com/shopping?q=tbn:ANd9GcTmRCU8kl8pZcX70wDVjcJ8fx3Jlv1HPWn88tAjbMIbHI1QE742qyOQY6-QEPgZRydEKeDmzdbPUXdV8BMIVYXdp4ayuUGvog0jTYlUT6XMJYoJ5RKv4x2EkeY&usqp=CAc') center center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform 0.7s ease;
      z-index: 10;
      opacity: 1;
      transform: scale(1);
    }

    /* طبقة التعتيم الخفيفة */
    .page-home::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(1px);
      -webkit-backdrop-filter: blur(1px);
      z-index: 0;
    }

    /* صندوق Glassmorphism */
    .glass-card {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border-radius: 48px 24px 48px 24px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.08);
      padding: 2rem 1.8rem;
      text-align: center;
      color: #fff;
      transition: all 0.3s ease;
      animation: fadeSlideUp 0.9s ease-out forwards;
    }

    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(40px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* تنسيق النصوص داخل الصندوق */
    .glass-card h1 {
      font-size: 2.4rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
      text-shadow: 0 4px 15px rgba(0,0,0,0.3);
      line-height: 1.2;
      word-break: break-word;
    }

    .glass-card .sub-message {
      font-size: 1.1rem;
      font-weight: 500;
      margin: 0.75rem 0 0.25rem;
      opacity: 0.95;
      line-height: 1.7;
    }

    .glass-card .sub-message span {
      display: inline-block;
      background: rgba(255, 215, 0, 0.15);
      padding: 0.1rem 0.6rem;
      border-radius: 40px;
      font-weight: 700;
    }

    .glass-card .highlight {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 0.5rem 0;
      color: #ffe484;
      text-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
    }

    .glass-card .small-note {
      font-size: 1rem;
      font-weight: 400;
      opacity: 0.9;
      margin: 0.8rem 0 1.2rem;
      line-height: 1.6;
    }

    /* الزر الكبير */
    .btn-primary {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 1rem 2.2rem;
      margin-top: 0.8rem;
      font-size: 1.5rem;
      font-weight: 800;
      font-family: 'Tajawal', sans-serif;
      color: #fff;
      border-radius: 80px;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      transition: all 0.25s ease;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 280px;
      margin-left: auto;
      margin-right: auto;
      background: linear-gradient(145deg, rgba(255,255,255,0.25), rgba(255,255,255,0.05));
      border-bottom: 3px solid rgba(255, 215, 0, 0.6);
    }

    .btn-primary:hover {
      transform: scale(1.02) translateY(-3px);
      background: rgba(255, 215, 0, 0.2);
      border-color: #ffd966;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 215, 0, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff7e0;
    }

    .btn-primary:active {
      transform: scale(0.96);
      transition-duration: 0.08s;
    }

    /* اختفاء الصفحة الأولى عند الانتقال */
    .page-home.hidden {
      opacity: 0;
      transform: scale(1.02);
      pointer-events: none;
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    /* Responsive دقيقة */
    @media (max-width: 480px) {
      .glass-card {
        padding: 1.8rem 1.2rem;
        border-radius: 36px 18px 36px 18px;
      }
      .glass-card h1 {
        font-size: 2rem;
      }
      .glass-card .sub-message {
        font-size: 1rem;
      }
      .btn-primary {
        font-size: 1.3rem;
        padding: 0.9rem 1.2rem;
        max-width: 240px;
      }
    }

    @media (min-width: 768px) {
      .glass-card {
        padding: 3rem 2.8rem;
        border-radius: 60px 30px 60px 30px;
      }
      .glass-card h1 {
        font-size: 3rem;
      }
      .btn-primary {
        font-size: 1.7rem;
        padding: 1.2rem 2.8rem;
        max-width: 340px;
      }
    }

    @media (min-width: 1024px) {
      .glass-card {
        padding: 3.5rem 3rem;
      }
      .glass-card h1 {
        font-size: 3.6rem;
      }
    }
  </style>
</head>
<body>

  <!-- الصفحة الأولى (Home) -->
  <div id="pageHome" class="page-home">
    <div class="glass-card">
      <h1>🎉 Happy Birthday Abd_ALrahman 🎉</h1>
      <div class="sub-message">
        بما إنك نجحت تعيش سنة كمان 😂<br />
        وأخيرًا بقيت <span>17 سنة</span>.
      </div>
      <div class="highlight">✨ حبيت اعملك حاجه ✨</div>
      <div class="small-note">
        بس أكيد مش هفاجئك بسهولة 😏<br />
        وراك كام تحدي صغير،<br />
        ولو عديتهم كلهم...<br />
        هتوصل لمفاجأتك في الآخر. 🎁
      </div>
      <button id="goToGameBtn" class="btn-primary">ورّينا شطارتك 🚀</button>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const pageHome = document.getElementById('pageHome');
      const goToGameBtn = document.getElementById('goToGameBtn');

      // الانتقال إلى صفحة اللعبة
      function goToGame() {
        // إخفاء الصفحة الأولى بتأثير ناعم
        pageHome.classList.add('hidden');
        
        // الانتقال إلى صفحة اللعبة بعد انتهاء تأثير الاختفاء
        setTimeout(() => {
          window.location.href = 'the_game.html'; // تأكد من أن اسم ملف اللعبة هو the_game.html
        }, 700);
      }

      // ربط الزر
      goToGameBtn.addEventListener('click', goToGame);

      // منع السكرول على الصفحة الأولى
      window.addEventListener('touchmove', function(e) {
        e.preventDefault();
      }, { passive: false });

      window.addEventListener('wheel', function(e) {
        e.preventDefault();
      }, { passive: false });

      window.addEventListener('keydown', function(e) {
        const keys = ['ArrowUp', 'ArrowDown', 'PageUp', 'PageDown', ' ', 'Space'];
        if (keys.includes(e.key) || e.key === ' ') {
          e.preventDefault();
        }
      }, { passive: false });

      // منع السكرول نهائياً
      document.body.style.overflow = 'hidden';

    })();
  </script>

</body>
</html>
